<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$title$ — matthewplotlib</title>
    <link rel="stylesheet" href="pdoc.css">
</head>
<body>
    <nav class="pdoc">
        <label id="navtoggle" for="togglestate" class="pdoc-button">
            <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'>
                <path stroke-linecap='round' stroke="currentColor"
                      stroke-miterlimit='10' stroke-width='2'
                      d='M4 7h22M4 15h22M4 23h22'/>
            </svg>
        </label>
        <input id="togglestate" type="checkbox" aria-hidden="true" tabindex="-1">
        <div>
            <a href="index.html" class="nav-title">matthewplotlib</a>
            <input type="search" placeholder="Search..." role="searchbox" aria-label="search"
                   pattern=".+" required>
            <h2>Getting Started</h2>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="quickstart.html">Quickstart</a></li>
                <li><a href="examples.html">Examples</a></li>
                <li><a href="roadmap.html">Roadmap</a></li>
                <li><a href="changelog.html">Changelog</a></li>
            </ul>
            <h2>API Reference</h2>
            <ul>
                <li><a class="module" href="matthewplotlib.html">matthewplotlib</a></li>
            </ul>
        </div>
    </nav>
    <main class="pdoc">
        <button class="pdoc-button git-button theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">
            <span class="theme-icon"></span>
        </button>
$if(source)$
        <a class="pdoc-button git-button" href="$source$">Edit on GitHub</a>
$endif$
        <div class="docstring page-content">
            $body$
        </div>
    </main>
    <script>
    (function() {
        function getPreferred() {
            var saved = localStorage.getItem('pdoc-theme');
            if (saved) return saved;
            return window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light' : 'dark';
        }
        function apply(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            var icon = document.querySelector('.theme-icon');
            if (icon) icon.textContent = theme === 'dark' ? '\u263E' : '\u2600';
        }
        window.toggleTheme = function() {
            var current = document.documentElement.getAttribute('data-theme') || 'dark';
            var next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('pdoc-theme', next);
            apply(next);
        };
        apply(getPreferred());
    })();
    </script>
    <script>
    function escapeHTML(html) {
        return document.createElement('div').appendChild(document.createTextNode(html)).parentNode.innerHTML;
    }
    const originalContent = document.querySelector("main.pdoc");
    let currentContent = originalContent;
    function setContent(innerHTML) {
        let elem;
        if (innerHTML) {
            elem = document.createElement("main");
            elem.classList.add("pdoc");
            elem.innerHTML = innerHTML;
        } else {
            elem = originalContent;
        }
        if (currentContent !== elem) {
            currentContent.replaceWith(elem);
            currentContent = elem;
        }
    }
    function getSearchTerm() {
        return (new URL(window.location)).searchParams.get("search");
    }
    const searchBox = document.querySelector(".pdoc input[type=search]");
    searchBox.addEventListener("input", function () {
        let url = new URL(window.location);
        if (searchBox.value.trim()) {
            url.hash = "";
            url.searchParams.set("search", searchBox.value);
        } else {
            url.searchParams.delete("search");
        }
        history.replaceState("", "", url.toString());
        onInput();
    });
    window.addEventListener("popstate", onInput);
    let search, searchErr;
    async function initialize() {
        try {
            search = await new Promise((resolve, reject) => {
                const script = document.createElement("script");
                script.type = "text/javascript";
                script.async = true;
                script.onload = () => resolve(window.pdocSearch);
                script.onerror = (e) => reject(e);
                script.src = "search.js";
                document.getElementsByTagName("head")[0].appendChild(script);
            });
        } catch (e) {
            searchErr = "Cannot fetch search index.";
        }
        onInput();
        document.querySelector("nav.pdoc").addEventListener("click", e => {
            if (e.target.hash) {
                searchBox.value = "";
                searchBox.dispatchEvent(new Event("input"));
            }
        });
    }
    function onInput() {
        setContent((() => {
            const term = getSearchTerm();
            if (!term) return null;
            if (searchErr) return "<h3>Error: " + searchErr + "</h3>";
            if (!search) return "<h3>Searching...</h3>";
            window.scrollTo({top: 0, left: 0, behavior: 'auto'});
            const results = search(term);
            let html;
            if (results.length === 0) {
                html = "No search results for '" + escapeHTML(term) + "'.";
            } else {
                html = "<h4>" + results.length + " search result" + (results.length > 1 ? "s" : "") + " for '" + escapeHTML(term) + "'.</h4>";
            }
            for (let result of results.slice(0, 10)) {
                let doc = result.doc;
                let url = doc.modulename.replaceAll(".", "/") + ".html";
                if (doc.qualname) url += "#" + doc.qualname;
                let heading;
                switch (doc.kind) {
                    case "function":
                        heading = doc.fullname.endsWith(".__init__")
                            ? '<span class="name">' + doc.fullname.replace(/\.__init__$$/, "") + "</span>" + doc.signature
                            : '<span class="def">' + doc.funcdef + '</span> <span class="name">' + doc.fullname + "</span>" + doc.signature;
                        break;
                    case "class":
                        heading = '<span class="def">class</span> <span class="name">' + doc.fullname + "</span>";
                        if (doc.bases) heading += '<wbr>(<span class="base">' + doc.bases + "</span>)";
                        heading += ":";
                        break;
                    default:
                        heading = '<span class="name">' + doc.fullname + "</span>";
                }
                html += '<section class="search-result"><a href="' + url + '" class="attr ' + doc.kind + '">' + heading + '</a><div class="docstring">' + doc.doc + "</div></section>";
            }
            return html;
        })());
    }
    if (getSearchTerm()) {
        initialize();
        searchBox.value = getSearchTerm();
        onInput();
    } else {
        searchBox.addEventListener("focus", initialize, {once: true});
    }
    searchBox.addEventListener("keydown", e => {
        if (["ArrowDown", "ArrowUp", "Enter"].includes(e.key)) {
            let focused = currentContent.querySelector(".search-result.focused");
            if (!focused) {
                currentContent.querySelector(".search-result").classList.add("focused");
            } else if (e.key === "ArrowDown" && focused.nextElementSibling && focused.nextElementSibling.classList.contains("search-result")) {
                focused.classList.remove("focused");
                focused.nextElementSibling.classList.add("focused");
                focused.nextElementSibling.scrollIntoView({behavior: "smooth", block: "nearest"});
            } else if (e.key === "ArrowUp" && focused.previousElementSibling && focused.previousElementSibling.classList.contains("search-result")) {
                focused.classList.remove("focused");
                focused.previousElementSibling.classList.add("focused");
                focused.previousElementSibling.scrollIntoView({behavior: "smooth", block: "nearest"});
            } else if (e.key === "Enter") {
                focused.querySelector("a").click();
            }
        }
    });
    </script>
</body>
</html>
